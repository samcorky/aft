# Security Note: This stack should be deployed together as a single unit.
# Internal services (Redis, Database) are not exposed externally and rely on
# container-to-container communication within the aft network. Splitting services
# across hosts or exposing internal services would require additional security
# measures (authentication, encryption, network isolation).

services:
  db:
    image: mysql:9.5.0
    container_name: aft-db
    restart: unless-stopped
    command: --max_allowed_packet=128M
    env_file: .env
    security_opt:
      - no-new-privileges:true
    environment:
      - MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD}
      - MYSQL_DATABASE=${MYSQL_DATABASE}
      - MYSQL_USER=${MYSQL_USER}
      - MYSQL_PASSWORD=${MYSQL_PASSWORD}
    volumes:
      - ./data:/var/lib/mysql
    networks:
      - aft

  redis:
    image: redis:7-alpine
    container_name: aft-redis
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    networks:
      - aft
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  server:
    build:
      context: .
      dockerfile: server/Dockerfile
    container_name: aft-server
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    env_file: .env
    depends_on:
      - db
      - redis
    ports:
      - "5000:5000"
    volumes:
      - ./backups:/app/backups
      - backgrounds_volume:/var/www/images/backgrounds
    networks:
      - aft
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000/api/test').read()"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 40s

  nginx:
    build:
      context: ./server
      dockerfile: Dockerfile.nginx
    container_name: aft-web
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    depends_on:
      server:
        condition: service_healthy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./www:/usr/share/nginx/html
      - ./server/nginx.conf:/etc/nginx/conf.d/default.conf
      - backgrounds_volume:/usr/share/nginx/html/images/backgrounds
    networks:
      - aft

networks:
  aft:
    driver: bridge

volumes:
  backgrounds_volume:
    driver: local