services:
  db:
    image: mysql:latest
    container_name: aft-db
    restart: unless-stopped
    env_file: .env
    environment:
      - MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD}
      - MYSQL_DATABASE=${MYSQL_DATABASE}
      - MYSQL_USER=${MYSQL_USER}
      - MYSQL_PASSWORD=${MYSQL_PASSWORD}
    volumes:
      - ./data:/var/lib/mysql
    networks:
      - aft

  server:
    build: ./server
    container_name: aft-server
    restart: unless-stopped
    env_file: .env
    depends_on:
      - db
    ports:
      - "5000:5000"
    networks:
      - aft
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000/api/test').read()"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 40s

  nginx:
    build:
      context: ./server
      dockerfile: Dockerfile.nginx
    container_name: aft-web
    restart: unless-stopped
    depends_on:
      server:
        condition: service_healthy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./www:/usr/share/nginx/html
      - ./server/nginx.conf:/etc/nginx/conf.d/default.conf
    networks:
      - aft

networks:
  aft:
    driver: bridge