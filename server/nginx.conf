# Skip redirect for local loopback hosts and for traffic that is already
# HTTPS at an upstream reverse proxy.
map "$http_x_forwarded_proto:$http_host" $skip_https_redirect {
    default 0;
    ~*^https: 1;
    ~*^[^:]*:(localhost|127\.0\.0\.1)(:\d+)?$ 1;
}

# Never redirect Socket.IO requests at this layer. Redirecting websocket
# upgrade requests returns 301 and breaks the connection handshake.
map $request_uri $skip_socketio_redirect {
    default 0;
    ~^/socket\.io 1;
}

# Redirect only when traffic is plain HTTP and not targeting Socket.IO.
map "$skip_https_redirect:$skip_socketio_redirect" $do_https_redirect {
    default 0;
    "0:0" 1;
}

# Preserve upstream protocol when behind a reverse proxy (e.g. Traefik).
# Fall back to the local scheme for direct, non-proxied requests.
map $http_x_forwarded_proto $proxy_x_forwarded_proto {
    default $http_x_forwarded_proto;
    "" $scheme;
}

# Correctly set Connection header for websocket upgrades while allowing
# normal HTTP requests used by Socket.IO polling transport.
map $http_upgrade $connection_upgrade {
    default upgrade;
    "" close;
}

# HTTP server - redirect to HTTPS
server {
    listen 80 default_server;
    server_name _;

    # Redirect direct HTTP traffic to HTTPS by default.
    # Skip redirect for loopback hosts and for requests where TLS was
    # already terminated by an upstream reverse proxy.

    if ($do_https_redirect = 1) {
        return 301 https://$host$request_uri;
    }
    
    # WebSocket proxy for Socket.IO (must be before static file rules)
    # Handles both WebSocket connections and client library serving
    location /socket.io {
        proxy_pass http://server:5000/socket.io;
        proxy_http_version 1.1;
        proxy_buffering off;
        proxy_set_header Host $host;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $proxy_x_forwarded_proto;
        proxy_read_timeout 3600;
        proxy_send_timeout 3600;
    }
    
    # API proxy (handles all /api/ requests including flasgger_static)
    location /api/ {
        proxy_pass http://server:5000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $proxy_x_forwarded_proto;
        
        # API responses should not be cached
        add_header Cache-Control "no-cache, no-store, must-revalidate, proxy-revalidate, max-age=0";
        add_header Pragma "no-cache";
        add_header Expires "0";
        
        # Disable proxy buffering for API responses
        proxy_buffering off;
        
        # Allow large file uploads for backups
        client_max_body_size 110M;
        
        # Increase timeouts for database operations
        proxy_read_timeout 300s;
        proxy_connect_timeout 300s;
        proxy_send_timeout 300s;
    }

    # Cache static assets (CSS, JS, images) for 1 hour - but NOT from /api/
    location ~* ^/(?!api/).*\.(css|js|jpg|jpeg|png|gif|ico|svg|woff|woff2|ttf|eot)$ {
        root /usr/share/nginx/html;
        expires 1h;
        add_header Cache-Control "public, max-age=3600";
    }
    
    # Don't cache HTML files to ensure users get latest version
    location ~* \.html$ {
        root /usr/share/nginx/html;
        expires -1;
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0";
    }
    
    # Default location for everything else
    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }
}

# HTTPS server
server {
    listen 443 ssl;
    server_name localhost;
    
    # SSL certificate paths
    # Entrypoint auto-generates self-signed certs when these files are missing.
    # For production, mount certificates from Let's Encrypt or your SSL provider.
    ssl_certificate /etc/nginx/ssl/cert.pem;
    ssl_certificate_key /etc/nginx/ssl/key.pem;
    
    # SSL configuration
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    # Browser hardening headers (defense in depth)
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; connect-src 'self' wss:" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    
    # WebSocket proxy for Socket.IO (must be before static file rules)
    # Handles both WebSocket connections and client library serving
    location /socket.io {
        proxy_pass http://server:5000/socket.io;
        proxy_http_version 1.1;
        proxy_buffering off;
        proxy_set_header Host $host;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_read_timeout 3600;
        proxy_send_timeout 3600;
    }
    
    # API proxy (handles all /api/ requests including flasgger_static)
    location /api/ {
        proxy_pass http://server:5000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;

        # Repeat security headers here because add_header is not merged
        # with the enclosing server block when set at location scope.
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; connect-src 'self' wss:" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        
        # API responses should not be cached
        add_header Cache-Control "no-cache, no-store, must-revalidate, proxy-revalidate, max-age=0";
        add_header Pragma "no-cache";
        add_header Expires "0";
        
        # Disable proxy buffering for API responses
        proxy_buffering off;
        
        # Allow large file uploads for backups
        client_max_body_size 110M;
        
        # Increase timeouts for database operations
        proxy_read_timeout 300s;
        proxy_connect_timeout 300s;
        proxy_send_timeout 300s;
    }
    
    # Cache static assets (CSS, JS, images) for 1 hour - but NOT from /api/
    location ~* ^/(?!api/).*\.(css|js|jpg|jpeg|png|gif|ico|svg|woff|woff2|ttf|eot)$ {
        root /usr/share/nginx/html;
        expires 1h;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; connect-src 'self' wss:" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Cache-Control "public, max-age=3600";
    }
    
    # Don't cache HTML files to ensure users get latest version
    location ~* \.html$ {
        root /usr/share/nginx/html;
        expires -1;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; connect-src 'self' wss:" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0";
    }
    
    # Default location for everything else
    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }
}