<header class="header">
  <div class="header-container">
    <div class="header-left">
      <a href="/" class="header-logo-link">
        <img src="/images/NotA.png" alt="AFT Logo" class="header-logo">
        <div class="header-title-wrapper">
          <h1>AFT</h1>
          <h2>Atlassian Free Trello</h2>
        </div>
      </a>
    </div>
    <nav class="header-nav">
      <div class="boards-dropdown">
        <a href="/?show_boards=1" class="nav-link">Boards</a>
        <div class="boards-dropdown-menu" id="boards-dropdown-menu">
          <div class="boards-dropdown-loading">Loading boards...</div>
        </div>
      </div>
      <div class="nav-board-name" id="nav-board-name"></div>
    </nav>
    <div class="header-right">
      <div class="archive-toggle-wrapper" id="archive-toggle-wrapper" style="display: none;">
        <label class="archive-toggle-label">
          <span class="toggle-label-text">Show Archived</span>
          <input type="checkbox" id="archive-toggle-checkbox" class="archive-toggle-input">
          <span class="archive-toggle-slider"></span>
        </label>
      </div>
      <div class="notifications-dropdown">
        <a href="javascript:void(0)" class="icon-link" id="notifications-icon-link" title="Notifications" aria-label="Notifications" role="button">
          <svg class="icon-btn icon-svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"></path>
            <path d="M13.73 21a2 2 0 0 1-3.46 0"></path>
          </svg>
          <span class="notification-badge" id="notification-badge" style="display: none;"></span>
        </a>
        <div class="notifications-popup" id="notifications-popup">
          <div class="notifications-header">
            <h3>Notifications</h3>
            <button class="mark-all-read-btn" id="mark-all-read-btn" title="Mark all as read">Mark all read</button>
          </div>
          <div class="notifications-list" id="notifications-list">
            <div class="notifications-loading">Loading...</div>
          </div>
        </div>
      </div>
      <div class="settings-dropdown">
        <a href="javascript:void(0)" class="icon-link" title="Settings" aria-label="Settings" role="button">
          <svg class="icon-btn icon-svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="4" y1="6" x2="20" y2="6"></line>
            <line x1="4" y1="12" x2="20" y2="12"></line>
            <line x1="4" y1="18" x2="20" y2="18"></line>
            <circle cx="7" cy="6" r="2"></circle>
            <circle cx="12" cy="12" r="2"></circle>
            <circle cx="17" cy="18" r="2"></circle>
          </svg>
        </a>
        <div class="settings-dropdown-menu" id="settings-dropdown-menu">
          <a href="/settings.html" class="settings-dropdown-item">General Settings</a>
          <a href="/backup-restore.html" class="settings-dropdown-item">Backup & Restore</a>
        </div>
      </div>
      <div class="user-dropdown">
        <a href="javascript:void(0)" class="icon-link" title="User Menu" aria-label="User Menu" role="button">
          <svg class="icon-btn icon-svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
            <circle cx="12" cy="7" r="4"></circle>
          </svg>
        </a>
        <div class="user-dropdown-menu" id="user-dropdown-menu">
          <a href="/about.html" class="user-dropdown-item">About</a>
          <a href="/system-info.html" class="user-dropdown-item">System Info</a>
          <a href="/api/docs" class="user-dropdown-item" target="_blank" rel="noopener noreferrer">API Docs</a>
        </div>
      </div>
      <div class="db-status">
        <span class="status-icon connecting" id="status-icon"></span>
        <span class="status-text" id="status-text">Connecting...</span>
        <div class="version-line">
          <span class="version-info" id="version-info"></span>
          <span class="more-info-link">more info</span>
        </div>
      </div>
    </div>
  </div>
</header>
