<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Logged Out - AFT</title>
  <link rel="icon" type="image/png" href="/images/NotA.png">
  <script src="/js/theme-loader.js"></script>
  <link rel="stylesheet" href="/css/styles.css">
  <link rel="stylesheet" href="/css/logout.css">
</head>
<body>
  <div class="logout-container">
    <div class="logout-card">
      <div class="logout-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="20 6 9 17 4 12"></polyline>
        </svg>
      </div>
      
      <h1 class="logout-title">Successfully Logged Out</h1>
      
      <p class="logout-message">
        You have been successfully logged out of AFT. Your session has been cleared.
      </p>
      
      <div class="logout-actions">
        <a href="/login.html" class="btn btn-primary">Log Back In</a>
        <a href="/" class="btn btn-secondary">Go to Home</a>
      </div>
    </div>
  </div>
</body>
</html>
