<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Settings - AFT</title>
  <link rel="icon" type="image/png" href="/images/NotA.png">
  <script src="/js/theme-loader.js"></script>
  <link rel="stylesheet" href="/css/styles.css">
  <link rel="stylesheet" href="/css/header.css">
  <link rel="stylesheet" href="/css/settings.css">
</head>
<body>
  <!-- Header component will be loaded here -->
  
  <main class="canvas">
    <h1 class="page-title">Settings</h1>
    <div class="settings-container">
      
      <div class="settings-section">
        <div class="setting-item">
          <label for="default-board">Default Board</label>
          <p class="setting-help">Board to open on application startup. "None" will land on the boards page.</p>
          <select id="default-board" class="setting-select">
            <option value="">Loading...</option>
          </select>
        </div>

        <div class="setting-item">
          <label>Time Format</label>
          <p class="setting-help">Display times in 12-hour (AM/PM) or 24-hour format.</p>
          <div class="radio-group">
            <label class="radio-label">
              <input type="radio" name="time-format" value="12">
              <span>12-hour (2:30 PM)</span>
            </label>
            <label class="radio-label">
              <input type="radio" name="time-format" value="24" checked>
              <span>24-hour (14:30)</span>
            </label>
          </div>
        </div>

        <div class="setting-item">
          <label for="theme-select">Theme</label>
          <p class="setting-help">Choose a color theme for the application.</p>
          <select id="theme-select" class="setting-select">
            <option value="default">Default</option>
            <option value="custom1">At the Beach</option>
            <option value="darkmode">Dark Mode</option>
            <option value="jungle">Welcome to the Jungle</option>
          </select>
        </div>
      </div>

      <div class="settings-actions">
        <div id="settings-status" class="settings-status"></div>
      </div>
    </div>
  </main>

  <script src="/js/utils.js"></script>
  <script src="/js/notifications.js"></script>
  <script src="/js/header.js"></script>
  <script src="/js/settings.js"></script>
</body>
</html>
