<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Theme Builder - AFT</title>
  <link rel="icon" type="image/png" href="/images/NotA.png">
  <script src="/js/theme-loader.js"></script>
  <link rel="stylesheet" href="/css/styles.css">
  <link rel="stylesheet" href="/css/header.css">
  <link rel="stylesheet" href="/css/settings.css">
  <link rel="stylesheet" href="/css/theme-builder.css">
</head>
<body>
  <!-- Header component will be loaded here -->
  
  <main class="canvas">
    <div class="settings-container">
      <h2>Theme Builder</h2>
      <p class="page-description">Create and customise colour themes for the application.</p>
      
      <div class="settings-section">
        <div class="setting-item">
          <label for="theme-builder-select">Theme</label>
          <p class="setting-help">Select a theme to edit or create a new one.</p>
          <select id="theme-builder-select" class="setting-select">
            <option value="default">Default</option>
            <option value="custom1">At the Beach</option>
            <option value="darkmode">Dark Mode</option>
            <option value="jungle">Welcome to the Jungle</option>
          </select>
        </div>
      </div>

      <div class="settings-section">
        <h3>Colour Variables</h3>
        
        <div class="theme-section">
          <h4>Primary Colours</h4>
          <div class="theme-grid">
            <div class="theme-field">
              <label for="primary-color">Primary Colour</label>
              <div class="color-input-group">
                <input type="color" id="primary-color" value="#3498DB">
                <input type="text" class="color-text" value="#3498DB">
              </div>
            </div>
            
            <div class="theme-field">
              <label for="primary-hover">Primary Hover</label>
              <div class="color-input-group">
                <input type="color" id="primary-hover" value="#2980B9">
                <input type="text" class="color-text" value="#2980B9">
              </div>
            </div>
            
            <div class="theme-field">
              <label for="secondary-color">Secondary Colour</label>
              <div class="color-input-group">
                <input type="color" id="secondary-color" value="#95A5A6">
                <input type="text" class="color-text" value="#95A5A6">
              </div>
            </div>
            
            <div class="theme-field">
              <label for="secondary-hover">Secondary Hover</label>
              <div class="color-input-group">
                <input type="color" id="secondary-hover" value="#7F8C8D">
                <input type="text" class="color-text" value="#7F8C8D">
              </div>
            </div>
          </div>
        </div>

        <div class="theme-section">
          <h4>Status Colours</h4>
          <div class="theme-grid">
            <div class="theme-field">
              <label for="success-color">Success Colour</label>
              <div class="color-input-group">
                <input type="color" id="success-color" value="#28A745">
                <input type="text" class="color-text" value="#28A745">
              </div>
            </div>
            
            <div class="theme-field">
              <label for="error-color">Error Colour</label>
              <div class="color-input-group">
                <input type="color" id="error-color" value="#DC3545">
                <input type="text" class="color-text" value="#DC3545">
              </div>
            </div>
            
            <div class="theme-field">
              <label for="warning-color">Warning Colour</label>
              <div class="color-input-group">
                <input type="color" id="warning-color" value="#FFC107">
                <input type="text" class="color-text" value="#FFC107">
              </div>
            </div>
          </div>
        </div>

        <div class="theme-section">
          <h4>Text Colours</h4>
          <div class="theme-grid">
            <div class="theme-field">
              <label for="text-color">Text Colour</label>
              <div class="color-input-group">
                <input type="color" id="text-color" value="#2C3E50">
                <input type="text" class="color-text" value="#2C3E50">
              </div>
            </div>
            
            <div class="theme-field">
              <label for="text-bold">Text Bold</label>
              <div class="color-input-group">
                <input type="color" id="text-bold" value="#2C3E50">
                <input type="text" class="color-text" value="#2C3E50">
              </div>
            </div>
            
            <div class="theme-field">
              <label for="text-muted">Text Muted</label>
              <div class="color-input-group">
                <input type="color" id="text-muted" value="#7F8C8D">
                <input type="text" class="color-text" value="#7F8C8D">
              </div>
            </div>
          </div>
        </div>

        <div class="theme-section">
          <h4>Background Colours</h4>
          <div class="theme-grid">
            <div class="theme-field">
              <label for="background-light">Background Light</label>
              <div class="color-input-group">
                <input type="color" id="background-light" value="#F5F5F5">
                <input type="text" class="color-text" value="#F5F5F5">
              </div>
            </div>
            
            <div class="theme-field">
              <label for="page-panel-background">Page Panel Background</label>
              <div class="color-input-group">
                <input type="color" id="page-panel-background" value="#FFFFFF">
                <input type="text" class="color-text" value="#FFFFFF">
              </div>
            </div>
            
            <div class="theme-field">
              <label for="border-color">Border Colour</label>
              <div class="color-input-group">
                <input type="color" id="border-color" value="#E0E0E0">
                <input type="text" class="color-text" value="#E0E0E0">
              </div>
            </div>
          </div>
        </div>

        <div class="theme-section">
          <h4>Board Card Colours</h4>
          <div class="theme-grid">
            <div class="theme-field">
              <label for="card-bg-color">Board Card Background</label>
              <div class="color-input-group">
                <input type="color" id="card-bg-color" value="#FFFFFF">
                <input type="text" class="color-text" value="#FFFFFF">
              </div>
            </div>
          </div>
        </div>

        <div class="theme-section">
          <h4>Header & Icons</h4>
          <div class="theme-grid">
            <div class="theme-field">
              <label for="header-background">Header Background</label>
              <div class="color-input-group">
                <input type="color" id="header-background" value="#2C3E50">
                <input type="text" class="color-text" value="#2C3E50">
              </div>
            </div>
            
            <div class="theme-field">
              <label for="header-text-color">Header Text Colour</label>
              <div class="color-input-group">
                <input type="color" id="header-text-color" value="#FFFFFF">
                <input type="text" class="color-text" value="#FFFFFF">
              </div>
            </div>
            
            <div class="theme-field">
              <label for="header-menu-background">Header Menu Background</label>
              <div class="color-input-group">
                <input type="color" id="header-menu-background" value="#FFFFFF">
                <input type="text" class="color-text" value="#FFFFFF">
              </div>
            </div>
            
            <div class="theme-field">
              <label for="header-menu-hover">Header Menu Hover</label>
              <div class="color-input-group">
                <input type="color" id="header-menu-hover" value="#F5F5F5">
                <input type="text" class="color-text" value="#F5F5F5">
              </div>
            </div>
            
            <div class="theme-field">
              <label for="header-menu-text-color">Header Menu Text Colour</label>
              <div class="color-input-group">
                <input type="color" id="header-menu-text-color" value="#2C3E50">
                <input type="text" class="color-text" value="#2C3E50">
              </div>
            </div>
            
            <div class="theme-field">
              <label for="header-button-background">Header Button Background</label>
              <div class="color-input-group">
                <input type="color" id="header-button-background" value="#404E5C">
                <input type="text" class="color-text" value="#404E5C">
              </div>
            </div>
            
            <div class="theme-field">
              <label for="header-button-hover">Header Button Hover</label>
              <div class="color-input-group">
                <input type="color" id="header-button-hover" value="#384552">
                <input type="text" class="color-text" value="#384552">
              </div>
            </div>
            
            <div class="theme-field">
              <label for="icon-color">Icon Colour</label>
              <div class="color-input-group">
                <input type="color" id="icon-color" value="#FFFFFF">
                <input type="text" class="color-text" value="#FFFFFF">
              </div>
            </div>
          </div>
        </div>
      </div>

      <div class="settings-actions">
        <button class="btn btn-primary" id="save-theme-btn">Save Theme</button>
        <button class="btn btn-secondary" id="reset-theme-btn">Reset to Defaults</button>
        <div id="theme-status" class="settings-status"></div>
      </div>
    </div>
  </main>

  <script src="/js/utils.js"></script>
  <script src="/js/notifications.js"></script>
  <script src="/js/header.js"></script>
  <script src="/js/theme-builder.js"></script>
</body>
</html>
